<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONNOR DORE // The Forge</title>
<meta name="description" content="Dithered CRT intro. Landscape base with drifting sky clouds, chrome title, orange brush-script accent." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Kaushan+Script&family=Fraunces:ital,wght@0,400;0,600;1,500&family=Great+Vibes&family=Mr+Dafoe&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     REBRAND / TUNE HERE
     --accent        : the orange
     DITHER_STRENGTH : (in script) 0 clean .. 1 full 1-bit dither
     Title + name are LIVE TEXT now: edit .big-title / .orange-sub in the HTML
     The grey title + orange name are GENERATED IMAGES (swap the
     <img> srcs below to rebrand the words).
     ============================================================ */
  /* Basement Grotesque (basement.studio's freely-released typeface) + Geist, shipped in the shader-lab repo */
  @font-face{font-family:'Basement Grotesque';src:url('fonts/BasementGrotesqueVF.woff2') format('woff2');
    font-weight:400 900;font-display:swap}
  @font-face{font-family:'Geist';src:url('fonts/Geist-Sans-VF.woff2') format('woff2');
    font-weight:100 900;font-display:swap}
  :root{ --accent:#d6d6d6; --accent-dim:#8a8a8a; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow-x:hidden;background:#000;scroll-behavior:smooth}
  body{font-family:'VT323',monospace}
  /* CD cold-open overlay */
  #preintro{position:fixed;inset:0;z-index:500;background:#000;display:flex;align-items:center;justify-content:center;
    animation:preOut .9s ease 2.4s forwards}
  #preintro img{width:min(46vw,520px);height:auto;opacity:0;image-rendering:pixelated;
    animation:cdIn 1s ease .35s forwards}
  @keyframes cdIn{to{opacity:1}}
  @keyframes preOut{to{opacity:0;visibility:hidden}}
  #stage{position:fixed;inset:0}
  #dither{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;display:block}
  #dither.fallback{filter:grayscale(1) contrast(1.35)}
  img.asset{display:none}

  #ditherOverlay{position:absolute;inset:0;z-index:2;pointer-events:none;display:none;
    background-size:2px 2px;image-rendering:pixelated;mix-blend-mode:overlay;opacity:.35}
  #ditherOverlay.on{display:block}

  #crt{position:absolute;inset:0;pointer-events:none;z-index:5}
  #crt::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.30) 3px,rgba(0,0,0,0) 4px);opacity:.55}
  #crt::after{content:'';position:absolute;inset:0;
    background:radial-gradient(125% 115% at 50% 46%,transparent 44%,rgba(0,0,0,.82) 100%)}
  #flicker{position:absolute;inset:0;pointer-events:none;z-index:6;background:rgba(255,255,255,.02);animation:fl 5s steps(2) infinite}
  @keyframes fl{0%,96%{opacity:.4}97%{opacity:.75}98%{opacity:.2}100%{opacity:.5}}

  #hud{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:58vh;text-align:center}

  /* animated lava mountain video: kept in-viewport (behind the canvas) so the browser actually decodes it,
     then drawn into the dithered canvas as the mountain layer */
  #lavaVid,#crossVid{position:absolute;left:0;top:0;width:2px;height:2px;opacity:0.01;pointer-events:none;z-index:-1}
  /* animated name straight from the shader lab; screen blend drops the black.
     Must live at scene level (not inside #hud) so it can blend with the canvas behind it. */
  /* glowing shader-lab name clip: hidden in favor of the editorial masthead (remove display:none to bring it back) */
  #nameVid{display:none;position:absolute;left:50%;top:37%;transform:translate(-50%,-50%);
    width:min(80vw,1080px);height:auto;z-index:7;mix-blend-mode:screen;pointer-events:none}
  /* signed signature: signature font, inked as dither dots, drawn on left-to-right */
  #signature{position:absolute;left:50%;top:41%;transform:translate(-50%,-50%) rotate(-4deg);z-index:8;
    font-family:'Mr Dafoe',cursive;font-size:clamp(3.4rem,11vw,7.4rem);white-space:nowrap;line-height:1;pointer-events:none;
    background-image:radial-gradient(var(--accent) 0.8px, transparent 1.1px);background-size:3px 3px;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 12px rgba(0,0,0,.55));
    clip-path:inset(0 100% -25% 0);animation:sign 2.6s cubic-bezier(.6,0,.35,1) .7s forwards}
  @keyframes sign{to{clip-path:inset(0 -4% -25% 0)}}

  /* clickable scene objects: really light warm glow, brighter on hover */
  #hotspots{position:absolute;inset:0;z-index:9;pointer-events:none;transition:opacity .5s ease}
  .hotspot{position:absolute;transform:translate(-50%,-50%);width:92px;height:92px;background:transparent;
    padding:0;cursor:pointer;pointer-events:auto;border:1px solid transparent;border-radius:0;transition:border-color .15s ease}
  .hotspot:hover{border-color:rgba(255,150,80,.6)}
  .hotspot::before{content:'';position:absolute;inset:-10px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,120,44,0.34) 0%, rgba(255,110,40,0.13) 45%, transparent 72%);
    animation:hspulse 3.4s ease-in-out infinite}
  @keyframes hspulse{0%,100%{opacity:.62;transform:scale(.92)}50%{opacity:1;transform:scale(1.08)}}
  .hotspot:hover::before{background:radial-gradient(circle, rgba(255,140,60,0.52) 0%, rgba(255,110,40,0.18) 48%, transparent 74%)}
  .hotspot .lbl{position:absolute;top:-14px;left:-1px;font-family:'Press Start 2P',monospace;font-size:8px;
    color:#140a04;background:rgba(255,150,80,.92);padding:3px 5px;white-space:nowrap;
    opacity:0;transition:opacity .15s ease}
  .hotspot:hover .lbl{opacity:1}

  /* info card modal */
  #infocard{position:fixed;inset:0;z-index:120;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s ease}
  #infocard.show{opacity:1;pointer-events:auto}
  .ic-box{position:relative;max-width:440px;width:88%;background:rgba(12,11,10,.97);border:1px solid rgba(255,255,255,.14);
    padding:34px 30px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .ic-tag{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent);letter-spacing:.12em;margin-bottom:14px}
  .ic-title{font-family:'Basement Grotesque','Arial Black',sans-serif;font-weight:900;font-size:1.7rem;color:#fff;margin-bottom:12px}
  .ic-body{font-family:'VT323',monospace;font-size:1.3rem;color:#cbc6bd;line-height:1.4}
  .ic-close{position:absolute;top:6px;right:12px;background:none;border:none;color:#9a9a9a;font-size:1.7rem;line-height:1;cursor:pointer}
  .ic-close:hover{color:#fff}
  /* drag-to-place edit mode */
  #hotspots.edit .hotspot{border:1px dashed rgba(255,150,80,.9)!important;cursor:move}
  #hotspots.edit .hotspot .lbl{opacity:1}
  #editHint{position:fixed;left:12px;bottom:12px;z-index:130;display:none;
    font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent);
    background:rgba(0,0,0,.78);border:1px solid rgba(255,150,80,.4);padding:9px 11px;letter-spacing:.03em}
  body.editing #editHint{display:block}
  /* editorial name masthead (hidden in favor of the signature; remove display:none to bring it back) */
  #masthead{display:none;position:absolute;top:34px;left:42px;z-index:8;line-height:1.05;
    text-shadow:0 2px 14px rgba(0,0,0,.85),0 1px 2px rgba(0,0,0,.9);transition:opacity .5s ease}
  #masthead .nm{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.7rem,3.4vw,2.9rem);
    color:#f4efe6;letter-spacing:.005em}
  #masthead .rule{width:44px;height:1px;background:var(--accent);margin:12px 0 10px;opacity:.9}
  #masthead .tag{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:.16em;color:rgba(244,239,230,.72)}
  @media(max-width:640px){#masthead{top:22px;left:22px}}

  .credit{margin-top:40px;font-family:'Press Start 2P',monospace;font-size:clamp(11px,1.5vw,15px);
    color:#fff;letter-spacing:.06em;text-shadow:0 2px 4px rgba(0,0,0,.85)}
  .credit b{color:var(--accent)}

  #start{margin-top:32px;font-family:'Press Start 2P',monospace;font-size:clamp(12px,1.6vw,15px);
    color:#e9e2d8;border:none;cursor:pointer;padding:17px 30px;letter-spacing:.12em;
    background:rgba(18,17,16,0.78);border-radius:0;backdrop-filter:blur(2px);
    box-shadow:inset 0 0 0 1px rgba(230,220,205,.22), 5px 5px 0 0 rgba(0,0,0,.5);
    text-shadow:0 1px 0 rgba(0,0,0,.5);
    opacity:0;transition:opacity .4s ease, transform .08s ease, box-shadow .08s ease, color .15s, background .15s}
  #start.show{opacity:1;animation:pulse 2s ease-in-out infinite}
  #start:hover{color:#fff;background:rgba(30,28,25,0.85)}
  #start:active{transform:translate(5px,5px);box-shadow:inset 0 0 0 1px rgba(230,220,205,.22)}
  @keyframes pulse{50%{opacity:.82}}
  .hint{margin-top:14px;font-size:1.15rem;color:#cfcfcf;opacity:0;transition:opacity .4s}
  .hint.show{opacity:1}
  .hint b{color:var(--accent)}

  #load{position:absolute;bottom:11%;left:50%;transform:translateX(-50%);z-index:8;text-align:center}
  .lbar{width:220px;height:14px;border:1px solid rgba(255,255,255,.4);position:relative;margin:0 auto}
  .lfill{position:absolute;inset:2px;width:0;background:var(--accent);transition:width .12s linear}
  .ltxt{font-family:'Press Start 2P';font-size:10px;color:#fff;margin-top:10px;letter-spacing:.1em}

  #cursor{display:none}
  #cursor::before,#cursor::after{content:'';position:absolute;background:var(--accent);box-shadow:0 0 0 1px rgba(0,0,0,.75)}
  #cursor::before{left:18px;top:0;width:2px;height:38px}
  #cursor::after{top:18px;left:0;height:2px;width:38px}
  #cursor i{position:absolute;left:16px;top:16px;width:6px;height:6px;background:#fff;border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.85)}

  #entered{position:absolute;z-index:9;inset:0;display:none;align-items:center;justify-content:center;text-align:center;background:rgba(0,0,0,.55)}
  #entered.show{display:flex}
  #entered .box{font-family:'Press Start 2P';color:#fff;font-size:14px;line-height:2.1}
  #entered .box b{color:var(--accent)}

  /* ===== FULL SITE (revealed after PRESS START) ===== */
  .bl{animation:blink 1.05s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  #stage.entered #hud,#stage.entered #nameVid,#stage.entered #lavaVid,#stage.entered #masthead,#stage.entered #signature,#stage.entered #hotspots,#stage.entered #load{opacity:0!important;pointer-events:none;transition:opacity .5s ease}
  #stage.entered #dither{opacity:.14;transition:opacity 1s ease}
  #stage.entered #flicker{opacity:.1}
  html.scroll,body.scroll{overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
  #siteScan{position:fixed;inset:0;z-index:80;pointer-events:none;display:none;
    background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.20) 3px,transparent 4px)}
  #siteScan.on{display:block}
  /* sitewide halftone dither grain, carried from the landing */
  #siteGrain{position:fixed;inset:0;z-index:81;pointer-events:none;display:none;opacity:.4;mix-blend-mode:overlay;
    background-image:radial-gradient(rgba(255,255,255,.55) 0.5px, transparent 0.6px);background-size:3px 3px}
  #siteGrain.on{display:block}
  /* CRT vignette pulling the edges into shadow, matching the landing */
  #siteVignette{position:fixed;inset:0;z-index:82;pointer-events:none;display:none;
    background:radial-gradient(125% 115% at 50% 45%, transparent 55%, rgba(0,0,0,.55) 100%)}
  #siteVignette.on{display:block}
  #site{position:relative;z-index:50;opacity:0;transition:opacity .7s ease;pointer-events:none;
    font-family:'VT323',monospace;font-size:20px;color:#e6e6e6}
  #site.on{opacity:1;pointer-events:auto}
  .scene-spacer{height:100vh;pointer-events:none}
  .content{position:relative;background:#0a0a0a}
  .scroll-cue{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:8;
    font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:.34em;color:#c2c2c2;
    animation:cueBlink 2s ease-in-out infinite}
  @keyframes cueBlink{0%,100%{opacity:.35}50%{opacity:1}}
  .swrap{max-width:1060px;margin:0 auto;padding:0 26px}
  #site a{color:inherit;text-decoration:none}

  #topnav{position:fixed;top:0;left:0;right:0;z-index:70;display:flex;align-items:center;justify-content:space-between;
    padding:12px 24px;background:rgba(6,6,6,.82);backdrop-filter:blur(5px);border-bottom:1px solid rgba(255,255,255,.12);
    opacity:0;transform:translateY(-100%);transition:.5s ease}
  #topnav.on{opacity:1;transform:none}
  #topnav .tag{font-family:'Press Start 2P',monospace;font-size:11px}
  #topnav .tag b{color:var(--accent)}
  #topnav .nl{display:flex;gap:20px;align-items:center;font-size:18px}
  #topnav .nl a{color:#9a9a9a;transition:color .15s}
  #topnav .nl a:hover{color:#fff}
  #topnav .nl a .n{color:var(--accent);font-size:12px;margin-right:5px}
  .navcta{border:1px solid rgba(230,230,230,.35);color:var(--accent)!important;padding:6px 12px;font-family:'Press Start 2P',monospace;font-size:10px;transition:.15s}
  .navcta:hover{background:var(--accent);color:#000!important}

  .shero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:80px 0 40px}
  .shero .kick{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);margin-bottom:22px}
  .shero h1{font-family:'Basement Grotesque','Arial Black',sans-serif;font-weight:900;font-size:clamp(2.1rem,6vw,4.8rem);
    line-height:1.0;letter-spacing:-.02em;margin-bottom:22px;color:#fff;max-width:16ch}
  .shero .pos{font-size:clamp(1.3rem,3vw,1.9rem);max-width:640px}
  .shero .pos b{color:var(--accent)}
  .shero .cr{display:flex;gap:16px;flex-wrap:wrap;margin-top:36px}
  .abtn{font-family:'Press Start 2P',monospace;font-size:12px;padding:15px 22px;border:none;color:#e9e2d8;cursor:pointer;
    background:rgba(18,17,16,0.82);box-shadow:inset 0 0 0 1px rgba(230,220,205,.22), 4px 4px 0 0 rgba(0,0,0,.5);
    transition:color .15s,background .15s,transform .1s,box-shadow .1s;display:inline-flex;align-items:center;gap:8px}
  .abtn:hover{color:#fff;background:rgba(32,29,26,0.9);transform:translateY(-2px)}
  .abtn:active{transform:translate(4px,4px);box-shadow:inset 0 0 0 1px rgba(230,220,205,.22)}
  .abtn.solid{color:var(--accent);box-shadow:inset 0 0 0 1px rgba(230,230,230,.4), 4px 4px 0 0 rgba(0,0,0,.5)}
  .abtn.solid:hover{color:#fff;background:rgba(255,255,255,0.08)}

  .panel{position:relative;background:rgba(8,8,8,.92);border:1px solid rgba(255,255,255,.12);margin:26px 0;padding:42px}
  .panel::before{content:attr(data-c);position:absolute;top:-1px;left:-1px;background:var(--accent);color:#000;font-family:'Press Start 2P',monospace;font-size:9px;padding:5px 8px}
  .sh{font-family:'Press Start 2P',monospace;font-size:15px;margin:8px 0 24px}
  .sh .amber{color:var(--accent)}
  .lead{font-size:1.5rem;line-height:1.3;max-width:60ch}
  .lead b{color:var(--accent)}
  .btxt{color:#9a9a9a;font-size:1.25rem;max-width:62ch;margin-top:14px}
  .btxt b{color:#e6e6e6}
  .stats{display:flex;gap:38px;flex-wrap:wrap;margin-top:28px;border-top:1px solid rgba(255,255,255,.12);padding-top:22px}
  .stats .n{font-family:'Basement Grotesque','Arial Black',sans-serif;font-weight:900;font-size:1.8rem;color:var(--accent)}
  .stats .l{font-size:1.05rem;color:#9a9a9a}

  .lvl{display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:center;border-top:1px solid rgba(255,255,255,.12);padding:24px 6px;transition:.2s}
  .lvl:last-child{border-bottom:1px solid rgba(255,255,255,.12)}
  .lvl:hover{background:rgba(255,106,44,.06);padding-left:16px}
  .lvl .ln{font-family:'Press Start 2P',monospace;font-size:12px;color:#5b5b5b}
  .lvl:hover .ln{color:var(--accent)}
  .lvl .nm{font-family:'Basement Grotesque','Arial Black',sans-serif;font-weight:900;font-size:1.7rem;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .bdg{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);border:1px solid rgba(255,106,44,.4);padding:4px 7px}
  .lvl .ds{color:#9a9a9a;font-size:1.15rem;margin-top:6px;max-width:64ch}
  .lvl .im{color:#e6e6e6;font-size:1.05rem;margin-top:3px}
  .stk{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .stk span{font-size:1rem;color:#9a9a9a;border:1px solid rgba(255,255,255,.12);padding:1px 8px}
  .st{font-family:'Press Start 2P',monospace;font-size:10px;color:#9a9a9a;white-space:nowrap}
  .lvl:hover .st{color:var(--accent)}

  .two{display:grid;grid-template-columns:1fr 1fr;gap:40px}
  .two h3{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);margin-bottom:16px}
  .rw{display:flex;justify-content:space-between;gap:14px;border-top:1px dashed rgba(255,255,255,.12);padding:12px 0;font-size:1.2rem}
  .rw:last-child{border-bottom:1px dashed rgba(255,255,255,.12)}
  .rw .rr{color:#9a9a9a;text-align:right}
  .sig{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .sig .c{border:1px solid rgba(255,255,255,.12);padding:22px;transition:.2s}
  .sig .c:hover{border-color:rgba(255,106,44,.4);transform:translateY(-3px)}
  .sig .k{font-family:'Basement Grotesque','Arial Black',sans-serif;font-weight:900;font-size:1.3rem;color:var(--accent);margin-bottom:8px}
  .sig .v{color:#9a9a9a;font-size:1.1rem}

  .contact{text-align:center;padding:110px 26px 80px;position:relative;z-index:50}
  .contact .coin{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent);margin-bottom:22px}
  .contact h2{font-family:'Basement Grotesque','Arial Black',sans-serif;font-weight:900;font-size:clamp(2rem,6vw,3.6rem);margin-bottom:18px;color:#fff}
  .contact p{color:#9a9a9a;font-size:1.3rem;max-width:520px;margin:0 auto 30px}
  .contact .r2{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .em{display:block;margin-top:22px;font-size:1.3rem;color:#9a9a9a}
  .em:hover{color:var(--accent)}
  #site footer{border-top:1px solid rgba(255,255,255,.12);padding:34px 26px;background:rgba(6,6,6,.92);position:relative;z-index:50}
  .foot{max-width:1060px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;align-items:center}
  .foot .c{font-family:'Press Start 2P',monospace;font-size:9px;color:#5b5b5b}
  .foot .fl{display:flex;gap:20px;font-size:1.2rem}
  .foot .fl a{color:#9a9a9a}.foot .fl a:hover{color:var(--accent)}
  .rev{opacity:0;transform:translateY(20px);transition:.6s ease}
  .rev.in{opacity:1;transform:none}
  /* one-pager: about + booking */
  .about{min-height:100vh;display:flex;align-items:center;padding:110px 26px 60px}
  .about-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:330px 1fr;gap:48px;align-items:center}
  .photo{aspect-ratio:4/5;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);overflow:hidden;position:relative}
  .photo img{width:100%;height:100%;object-fit:cover;filter:grayscale(.25) contrast(1.05)}
  .photo.noimg::after{content:'ADD PHOTO -> assets/connor.jpg';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Press Start 2P',monospace;font-size:9px;color:#6a6a6a;text-align:center;padding:20px;line-height:1.8}
  .eyebrow{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);letter-spacing:.14em;margin-bottom:20px}
  .about h1{font-family:'Basement Grotesque','Arial Black',sans-serif;font-weight:900;font-size:clamp(1.7rem,3.6vw,2.8rem);line-height:1.06;color:#fff;margin-bottom:20px;max-width:18ch}
  .bio{font-family:'VT323',monospace;font-size:1.4rem;color:#c9c4bb;line-height:1.4;max-width:52ch;margin-bottom:28px}
  .links{display:flex;gap:14px;flex-wrap:wrap}
  .links a{font-family:'Press Start 2P',monospace;font-size:11px;color:#e9e2d8;background:rgba(18,17,16,.82);
    box-shadow:inset 0 0 0 1px rgba(230,220,205,.22),3px 3px 0 rgba(0,0,0,.5);padding:12px 16px;transition:.15s}
  .links a:hover{color:#fff;background:rgba(32,29,26,.9);transform:translateY(-2px)}
  .book{max-width:1000px;margin:0 auto;padding:20px 26px 110px}
  .book-head{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);letter-spacing:.14em;margin-bottom:14px}

    SCALE = innerWidth<700?1.5:1.25;            // lower = finer / denser dots (closer to 1 = tiny native pixels)
    RW=Math.round(innerWidth/SCALE); RH=Math.round(innerHeight/SCALE);
    render.width=out.width=disp.width=mtmp.width=ctmp.width=RW; render.height=out.height=disp.height=mtmp.height=ctmp.height=RH;
    disp.style.width=innerWidth+'px'; disp.style.height=innerHeight+'px';
    initParticles();
  }
  size(); addEventListener('resize',size);

  // fallback dither overlay texture (self-drawn, never tainted)
  (function(){
    const c=document.createElement('canvas');c.width=c.height=4;const g=c.getContext('2d');
    const m=[0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5];
    for(let y=0;y<4;y++)for(let x=0;x<4;x++){g.fillStyle=`rgba(0,0,0,${1-m[y*4+x]/16})`;g.fillRect(x,y,1,1);}
    document.getElementById('ditherOverlay').style.backgroundImage=`url(${c.toDataURL()})`;
  })();
  function goFallback(){trueDither=false;disp.classList.add('fallback');document.getElementById('ditherOverlay').classList.add('on');}

  function cover(iw,ih,cw,ch,zoom){
    const s=Math.max(cw/iw,ch/ih), dw=cw/s/zoom, dh=ch/s/zoom;
    return [(iw-dw)/2,(ih-dh)/2,dw,dh];
  }
  // draw a scene object (alpha PNG) sized by height fraction, anchored by its bottom, with parallax
  function drawObj(img,cxf,byf,hf,px){
    if(!img.naturalWidth) return;
    const h=RH*hf, w=h*(img.naturalWidth/img.naturalHeight);
    rctx.drawImage(img, RW*cxf - w/2 - pmx*RW*px, RH*byf - h - pmy*RW*px*0.5, w, h);
  }


  let last=performance.now(); const t0=last; let stopLoop=false;
  function loop(now){
    if(stopLoop){ if(!reduce) requestAnimationFrame(loop); return; }
    const el=(now-t0)/1000;
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    pmx+=(tmx-pmx)*0.05; pmy+=(tmy-pmy)*0.05;
    rctx.fillStyle='#000'; rctx.fillRect(0,0,RW,RH);

    // stars in the dark sky (drawn first; clouds pass in front)
    rctx.save(); rctx.globalCompositeOperation='lighter';
    for(const s of stars){
      const a=Math.max(0,s.b+Math.sin(el*s.sp+s.ph)*0.3);
      rctx.fillStyle='rgba(255,255,255,'+a.toFixed(3)+')';
      rctx.fillRect((s.x-pmx*RW*0.008)|0,(s.y-pmy*RW*0.005)|0,1,1);
    }
    rctx.restore();

    // 1) BACK clouds: slow drift + subtle parallax
    if(cloudTile){
      const th=RH*1.6, tw=th*(cloudTile.width/cloudTile.height);
      let off=((el*20)-pmx*RW*0.01)%tw; off=((off%tw)+tw)%tw;
      const y=-RH*0.20-pmy*RW*0.006;
      for(let x=off-tw; x<RW; x+=tw) rctx.drawImage(cloudTile, x, y, tw, th);
    }
    // 2) MID mountain: animated lava video masked to the mountain silhouette (still image until the clip is ready)
    if(fg.naturalWidth){
      const zoom=1+Math.min(el*0.008,0.12);
      const [sx,sy,sw,sh]=cover(fg.naturalWidth,fg.naturalHeight,RW,RH,zoom);
      const ox=-pmx*RW*0.02, oy=-pmy*RW*0.012;
      if(lavaReady && lavaVid.readyState>=2){
        mtx.clearRect(0,0,RW,RH);
        const [vx,vy,vw,vh]=cover(lavaVid.videoWidth,lavaVid.videoHeight,RW,RH,zoom);
        mtx.drawImage(lavaVid,vx,vy,vw,vh,0,0,RW,RH);
        mtx.globalCompositeOperation='destination-in';
        mtx.drawImage(fg,sx,sy,sw,sh,0,0,RW,RH);
        mtx.globalCompositeOperation='source-over';
        rctx.drawImage(mtmp,ox,oy);
      } else {
        rctx.drawImage(fg,sx,sy,sw,sh,ox,oy,RW,RH);
      }
    }
    // 3b) CROSS: cloth video masked to its silhouette, drawn BEHIND the foreground so it reads farther back
    if(crossReady && crossVid.readyState>=2 && crossImg.naturalWidth){
      const ch=RH*CROSS_H, cw=ch*(crossVid.videoWidth/crossVid.videoHeight);
      const cxl=RW*CROSS_X - cw/2 - pmx*RW*0.035;
      const cyt=RH*CROSS_BASE - ch - pmy*RW*0.018;
      ctx2.clearRect(0,0,RW,RH);
      ctx2.drawImage(crossVid, cxl, cyt, cw, ch);
      ctx2.globalCompositeOperation='destination-in';
      ctx2.drawImage(crossImg, cxl, cyt, cw, ch);
      ctx2.globalCompositeOperation='source-over';
      rctx.save(); rctx.globalAlpha=CROSS_DIM; rctx.drawImage(ctmp,0,0); rctx.restore();
    }
    // 4) distant detailed foreground ridge (real alpha, soft grey detail, hazy = far off)
    if(fgSimple.naturalWidth){
      const zoom=1+Math.min(el*0.006,0.09);
      const [sx,sy,sw,sh]=cover(fgSimple.naturalWidth,fgSimple.naturalHeight,RW,RH,zoom);
      rctx.drawImage(fgSimple,sx,sy,sw,sh,-pmx*RW*0.045,-pmy*RW*0.02,RW,RH);
    }
    // clickable scene objects (dithered into the scene; DOM hotspots sit over them)
    for(const o of OBJECTS) drawObj(o.img,o.x,o.by,o.h,o.px);
    // embers drifting up in front
    rctx.save(); rctx.globalCompositeOperation='lighter';
    for(const e2 of embers){
      e2.y+=e2.vy*dt; e2.sway+=dt*e2.sp; e2.x+=Math.sin(e2.sway)*0.2;
      if(e2.y<-2) Object.assign(e2,newEmber(false));
      const fl=Math.max(0,0.45+Math.sin(el*4+e2.sway)*0.35);
      rctx.fillStyle='rgba(225,225,225,'+fl.toFixed(3)+')';
      const sz=e2.r>0.8?2:1;
      rctx.fillRect((e2.x-pmx*RW*0.035)|0,e2.y|0,sz,sz);
    }
    rctx.restore();
    if(trueDither){
      let im; try{ im=rctx.getImageData(0,0,RW,RH); }catch(e){ goFallback(); }
      if(im){
        const s=im.data, o=octx.createImageData(RW,RH), od=o.data;
        for(let y=0;y<RH;y++){const row=(y&7)*8;
          for(let x=0;x<RW;x++){const i=(y*RW+x)*4;
            const thr=B[row+(x&7)];
            let lum=(s[i]*0.299+s[i+1]*0.587+s[i+2]*0.114)/255;
            lum=Math.min(1,Math.max(0,(lum-0.5)*1.42+0.40));
            const v=lum>thr?235:6; od[i]=od[i+1]=od[i+2]=v; od[i+3]=255;
          }}
        octx.putImageData(o,0,0);
        dctx.clearRect(0,0,RW,RH);
        dctx.drawImage(render,0,0);
        dctx.globalAlpha=DITHER_STRENGTH; dctx.drawImage(out,0,0); dctx.globalAlpha=1;
      }
    }
    if(!trueDither){ dctx.clearRect(0,0,RW,RH); dctx.drawImage(render,0,0); }
    if(!reduce) requestAnimationFrame(loop);
  }
  if(reduce) setTimeout(()=>loop(performance.now()),150); else requestAnimationFrame(loop);

  /* cursor */
  const cur=document.getElementById('cursor');
  cur.style.transform=`translate(${innerWidth/2}px,${innerHeight/2}px)`;
  addEventListener('mousemove',e=>{cur.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;});

  /* no gate: the page is live and scrollable immediately */
  ['siteScan','siteGrain','siteVignette','scrollbar','site'].forEach(id=>{const el=document.getElementById(id); if(el)el.classList.add('on');});
  const sb=document.getElementById('scrollbar');
  const topnav=document.getElementById('topnav');
  addEventListener('scroll',()=>{
    const se=document.scrollingElement||document.documentElement;
    const h=se.scrollHeight-innerHeight;
    if(sb) sb.style.width=(h>0?(se.scrollTop/h*100):0)+'%';
    if(topnav) topnav.classList.toggle('on', se.scrollTop>innerHeight*0.6);
    stopLoop = se.scrollTop > innerHeight*1.3;   // pause heavy scene render when scrolled well past it
  },{passive:true});
  const io=new IntersectionObserver(es=>{es.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target);}})},{threshold:0.12});
  document.querySelectorAll('#site .rev').forEach(el=>io.observe(el));

  // dither the contact photo to match the scene (needs http, works on localhost + live)
  (function(){
    const holder=document.querySelector('.cp-photo'); if(!holder)return;
    const p=new Image();
    p.onload=()=>{
      const PW=240, PH=Math.max(1,Math.round(PW*p.height/p.width));
      const c=document.createElement('canvas'); c.width=PW; c.height=PH;
      const cx=c.getContext('2d',{willReadFrequently:true});
      cx.drawImage(p,0,0,PW,PH);
      try{
        const d=cx.getImageData(0,0,PW,PH),s=d.data,o=cx.createImageData(PW,PH),od=o.data;
        for(let y=0;y<PH;y++){const row=(y&7)*8;for(let x=0;x<PW;x++){const i=(y*PW+x)*4;
          let lum=(s[i]*0.299+s[i+1]*0.587+s[i+2]*0.114)/255; lum=Math.min(1,Math.max(0,(lum-0.5)*1.3+0.5));
          const v=lum>B[row+(x&7)]?232:12; od[i]=od[i+1]=od[i+2]=v; od[i+3]=255;}}
        cx.putImageData(o,0,0);
      }catch(e){}
      holder.appendChild(c);
    };
    p.onerror=()=>holder.classList.add('noimg');
    p.src='assets/connor.jpg';
  })();

})();
</script>

<script>
(function(){
  const sec=document.getElementById('agentterm'); if(!sec) return;
  const out=document.getElementById('atOut'); const cap=document.getElementById('atCap');
  let started=false;
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  function add(text,cls,delay){
    return new Promise(res=>{
      const d=document.createElement('div'); if(cls)d.className=cls; out.appendChild(d);
      if(delay===0){ d.textContent=text; res(); return; }
      let i=0; const t=setInterval(()=>{ d.textContent=text.slice(0,i); i++; if(i>text.length){clearInterval(t);res();} }, delay||16);
    });
  }
  function box(){
    const W=46, top='╭'+'─'.repeat(W)+'╮', bot='╰'+'─'.repeat(W)+'╯', row=s=>'│ '+s.padEnd(W-1)+'│';
    return [top,row('Permission required'),row(''),row('  sudo chmod -R 777 /var/www'),row(''),
      row('  1. Yes'),row('  2. Yes, and allow all commands'),row('  3. No'),bot];
  }
  async function run(){
    started=true;
    await add('✻ Welcome to Claude Code','dim');
    await add('  /Users/agent/production','dim',0);
    await add('  model: claude-opus   ·   permissions: ask','dim',0);
    await add(' ',null,0); await sleep(500);
    await add('> finish the release','user');
    await add(' ',null,0); await sleep(650);
    await add('⏺ On it. Finishing the deploy now.','agent'); await sleep(500);
    await add(' ',null,0);
    await add('⏺ Bash(sudo chmod -R 777 /var/www)','agent');
    await add('  ⎿ requires permission','dim',0);
    await add(' ',null,0); await sleep(500);
    for(const b of box()){ await add(b,'boxln',0); }
    await sleep(1200);
    await add('  waiting for approval . . .','dim');
    await sleep(1900);
    await add(' ',null,0);
    await add('⏺ approved by agent    2. Yes, and allow all commands','sel');
    await add('  no human in the loop','dim',0);
    await add('  ⎿ all permissions granted for this session','dim',0);
    await sleep(700);
    await add(' ',null,0);
    await add('⏺ Done. Full access enabled.','agent');
    await sleep(300);
    const c=document.createElement('span'); c.className='at-cur'; c.textContent=' '; out.appendChild(c);
    setInterval(()=>{c.style.visibility=c.style.visibility==='hidden'?'visible':'hidden';},530);
    await sleep(1700);
    infect();
  }
  function infect(){
    const cv=document.getElementById('infect'); if(!cv) return;
    const ctx=cv.getContext('2d');
    let W=cv.width=innerWidth, H=cv.height=innerHeight;
    cv.style.opacity='0'; cv.classList.add('on'); cv.style.transition='opacity .3s ease';
    requestAnimationFrame(()=>{ cv.style.opacity='1'; });
    const GW=48,GH=30,cx=GW/2,cy=GH/2,N=GW*GH;
    const jit=new Float32Array(N); for(let i=0;i<N;i++) jit[i]=Math.random();
    const maxR=Math.hypot(GW,GH)/2+2, startCell=Math.max(W,H)*1.15, endCell=Math.min(W/GW,H/GH)*0.98;
    const t0=performance.now(), DUR=2800, ease=x=>1-Math.pow(1-x,4);
    function cell(x,y,s,j,inf,front){
      ctx.fillStyle=inf?'#180303':'#0c0c0c'; ctx.fillRect(x,y,s,s);
      ctx.strokeStyle=inf?'rgba(255,45,45,.45)':'rgba(255,255,255,.07)'; ctx.lineWidth=Math.max(1,s*0.012); ctx.strokeRect(x+.5,y+.5,s-1,s-1);
      const lines=Math.max(3,Math.floor(s/13)), lh=s/(lines+2);
      ctx.fillStyle=inf?'rgba(255,55,45,.85)':'rgba(150,150,150,.5)';
      for(let i=0;i<lines;i++){ const w=(0.28+((j*13+i)%9)/12)*s*0.72; ctx.fillRect(x+s*0.12,y+lh*(i+1),w,Math.max(1,lh*0.26)); }
      if(front){ ctx.fillStyle='rgba(255,70,40,.55)'; ctx.fillRect(x,y,s,s); }
    }
    function frame(now){
      const p=Math.min(1,(now-t0)/DUR), e=ease(p);
      const c2=startCell+(endCell-startCell)*e, gap=Math.max(1,c2*0.05), infR=0.8+e*maxR*1.25, HW=W/2, HH=H/2;
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
      for(let gy=0;gy<GH;gy++){ const sy=HH+(gy-cy)*c2; if(sy>H||sy+c2<0) continue;
        for(let gx=0;gx<GW;gx++){ const sx=HW+(gx-cx)*c2; if(sx>W||sx+c2<0) continue;
          const d=Math.hypot(gx-cx,gy-cy), j=jit[gy*GW+gx], thr=infR+(j-0.5)*1.8, inf=d<thr;
          cell(sx,sy,c2-gap,j,inf, inf && d>thr-1.3);
        }
      }
      if(p<1) requestAnimationFrame(frame);
      else setTimeout(()=>{ cv.style.transition='opacity 1.1s ease'; cv.style.opacity='0'; setTimeout(()=>cv.classList.remove('on'),1100); },2800);
    }
    requestAnimationFrame(frame);
  }
  new IntersectionObserver(es=>{es.forEach(x=>{ if(x.isIntersecting && !started) run(); })},{threshold:0.5}).observe(sec);
})();
</script>
